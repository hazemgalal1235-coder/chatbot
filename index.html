<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>د. جلدية - المساعد الطبي</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
#chat-container { display: flex; flex-direction: column; height: 620px; width: 100%; max-width: 500px; border: 1px solid #e0e0e0; border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
#chat-header { background: #f8f8f8; border-bottom: 1px solid #eee; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
#avatar { width: 42px; height: 42px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
#header-text h3 { font-size: 15px; font-weight: 600; color: #222; }
#header-text p { font-size: 12px; color: #888; margin-top: 2px; }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; margin-right: auto; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 8px; max-width: 85%; }
.msg.user { align-self: flex-start; flex-direction: row-reverse; }
.msg.bot { align-self: flex-end; }
.bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.msg.user .bubble { background: #1D9E75; color: white; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #f0f0f0; color: #222; border-bottom-left-radius: 4px; }
.bot-avatar { width: 30px; height: 30px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; align-self: flex-end; }
#typing { display: none; align-self: flex-end; background: #f0f0f0; padding: 10px 14px; border-radius: 16px; border-bottom-left-radius: 4px; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #aaa; margin: 0 2px; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
#input-area { border-top: 1px solid #eee; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; }
#user-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px; font-size: 14px; resize: none; font-family: inherit; direction: rtl; max-height: 100px; outline: none; line-height: 1.5; }
#user-input:focus { border-color: #1D9E75; }
#send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn:hover { background: #0F6E56; }
#send-btn svg { width: 18px; height: 18px; fill: white; }
#disclaimer { font-size: 11px; color: #999; text-align: center; padding: 8px; background: #fafafa; border-top: 1px solid #eee; }
</style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div id="avatar">🩺</div>
    <div id="header-text">
      <h3>د. جلدية - مساعدك الطبي</h3>
      <p>متخصص في الامراض الجلدية</p>
    </div>
    <div id="status-dot"></div>
  </div>
  <div id="messages">
    <div class="msg bot">
      <div class="bot-avatar">🩺</div>
      <div class="bubble">أهلاً! أنا مساعدك الطبي المتخصص في <strong>الأمراض الجلدية</strong>.<br><br>يمكنني مساعدتك في الأسئلة المتعلقة بالبشرة، الشعر، والأظافر. كيف يمكنني مساعدتك اليوم؟</div>
    </div>
  </div>
  <div id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="input-area">
    <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    <textarea id="user-input" rows="1" placeholder="اكتب سؤالك هنا..."></textarea>
  </div>
  <div id="disclaimer">⚠️ هذا المساعد للتوعية فقط وليس بديلاً عن الطبيب المختص</div>
</div>

<script>
// غيّر الرابط ده بعد رفع الباك إند
const API_URL = "https://chatbot-production-9dcc.up.railway.app/chat";

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let history = [];

function addMessage(text, role) {
  const msg = document.createElement('div');
  msg.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  if (role !== 'user') { const av = document.createElement('div'); av.className = 'bot-avatar'; av.textContent = '🩺'; msg.appendChild(av); }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(show) { typingEl.style.display = show ? 'flex' : 'none'; if (show) messagesEl.scrollTop = messagesEl.scrollHeight; }

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addMessage(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping(true); sendBtn.disabled = true;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.reply || 'عذراً، حدث خطأ.';
    history.push({ role: 'assistant', content: reply });
    showTyping(false); addMessage(reply, 'bot');
  } catch(e) { showTyping(false); addMessage('عذراً، حدث خطأ في الاتصال.', 'bot'); }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = inputEl.scrollHeight + 'px'; });
</script>
</body>
</html>
